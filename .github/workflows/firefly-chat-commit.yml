name: Firefly Chat Commit

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Was soll der Bot im Code tun?"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    env:
      FIREFLY_BOT_TOKEN: ${{ secrets.FIREFLY_BOT_TOKEN }}
      OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout (ohne Default-Creds)
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Git-User setzen (firefly-bot)
        run: |
          git config user.name "firefly-bot"
          git config user.email "firefly-bot@users.noreply.github.com"

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Aider installieren (optional)
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install "aider-chat>=0.60"

      - name: Code-Änderungen aus Task erzeugen (optional)
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          aider --yes --message "${{ inputs.task }}" --commit --no-gitignore || true

      - name: Commit (falls Änderungen)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "bot: ${{ inputs.task }}"
          else
            echo "No changes to commit."
          fi

      - name: Push als firefly-bot (Branch + PR)
        if: ${{ env.FIREFLY_BOT_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ github.token }}   # für gh pr create
        run: |
          set -e
          BRANCH="bot/${GITHUB_RUN_ID}"
          git checkout -B "$BRANCH"
          # Push mit Bot-PAT
          git remote set-url origin https://x-access-token:${FIREFLY_BOT_TOKEN}@github.com/glitzereinhorn270487/firefly.git
          git push -u origin "$BRANCH"
          # PR mit dem Actions-Token
          gh pr create --fill --head "$BRANCH" --repo glitzereinhorn270487/firefly






      - name: Hinweis, falls kein Bot-Token gesetzt ist
        if: ${{ env.FIREFLY_BOT_TOKEN == '' }}
        run: |
          echo "::warning:: FIREFLY_BOT_TOKEN secret fehlt  Push übersprungen."


