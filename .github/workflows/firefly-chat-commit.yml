name: Firefly Chat Commit

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Was soll der Bot im Code tun?"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    env:
      FIREFLY_BOT_TOKEN: ${{ secrets.FIREFLY_BOT_TOKEN }}
      OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout (ohne Default-Creds)
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0   # origin/main verfügbar machen

      - name: Git-User setzen (firefly-bot)
        run: |
          git config user.name "firefly-bot"
          git config user.email "firefly-bot@users.noreply.github.com"

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Aider installieren (optional)
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install "aider-chat>=0.60"

      # Task-Text & Metadaten in Dateien schreiben (quote-safe)
      - name: Task-Text in Dateien schreiben
        run: |
          # Task-Text
          cat > .firefly_task.txt << 'EOF'
          ${{ inputs.task }}
          EOF

          # Sichere, kurze Titelzeile (ohne Quotes/Klammern)
          echo "bot: task ${GITHUB_RUN_ID}" > .firefly_title.txt

          # Commit-Message mit Task im Body
          {
            echo "bot: task ${GITHUB_RUN_ID}"
            echo
            echo "Task:"
            cat .firefly_task.txt
          } > .firefly_commit.txt

      - name: Code-Änderungen aus Task erzeugen (optional)
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          aider --yes --message "$(cat .firefly_task.txt)" --commit --no-gitignore || true

      - name: Commit (falls Änderungen)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            # Fallback, falls Datei fehlt (sollte durch Step oben vorhanden sein)
            [ -f .firefly_commit.txt ] || echo "bot: changes ${GITHUB_RUN_ID}" > .firefly_commit.txt
            git commit -F .firefly_commit.txt || echo "No changes to commit."
          else
            echo "No changes to commit."
          fi

      - name: Branch pushen und PR erstellen (nur wenn Änderungen + Token)
        if: ${{ env.FIREFLY_BOT_TOKEN != '' && !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}   # für gh pr create
        run: |
          # Nur wenn es neue Commits gegenüber main gibt
          if [ -z "$(git log origin/main..HEAD --oneline || true)" ]; then
            echo "No new commits; skipping PR creation."
            exit 0
          fi

          BRANCH="bot/${GITHUB_RUN_ID}"
          git checkout -B "$BRANCH"

          # Push mit Bot-PAT
          git remote set-url origin https://x-access-token:${FIREFLY_BOT_TOKEN}@github.com/glitzereinhorn270487/firefly.git
          git push -u origin "$BRANCH"

          # PR mit sicherem Title + Body aus Datei (falls verfügbar)
          if [ -f .firefly_task.txt ]; then
            gh pr create \
              --title "$(cat .firefly_title.txt)" \
              --body-file .firefly_task.txt \
              --head "$BRANCH" \
              --base "main" \
              --repo glitzereinhorn270487/firefly
          else
            gh pr create \
              --title "bot: task ${GITHUB_RUN_ID}" \
              --body "Automated PR by firefly-bot" \
              --head "$BRANCH" \
              --base "main" \
              --repo glitzereinhorn270487/firefly
          fi
