name: Firefly Chat Commit
on:
  workflow_dispatch:
    inputs:
      task:
        description: "Was soll der Bot im Code tun?"
        required: true
        type: string
permissions:
  contents: write
jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - run: |
          git config user.name "firefly-bot"
          git config user.email "firefly-bot@users.noreply.github.com"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Aider installieren (optional)
        if: ${{ secrets.OPENAI_API_KEY != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install "aider-chat>=0.60"
      - name: Code-Änderungen aus Task erzeugen (optional)
        if: ${{ secrets.OPENAI_API_KEY != '' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          aider --yes --message "${{ inputs.task }}" --commit --no-gitignore || true
      - name: Commit & Push als firefly-bot
        env:
          BOT_TOKEN: ${{ secrets.FIREFLY_BOT_TOKEN }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "bot: ${{ inputs.task }}"
          fi
          git remote set-url origin https://firefly-bot:${BOT_TOKEN}@github.com/glitzereinhorn270487/firefly.git
          git push || true